<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - RFLVG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 2rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #333;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .back-btn {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      color: #888;
      border: 1px solid #444;
      padding: 0.5rem 1rem;
      transition: all 0.3s;
    }
    .back-btn:hover { border-color: #c17a56; color: #fff; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #666;
      padding: 1rem;
      border-bottom: 2px solid #333;
    }
    td {
      padding: 1rem;
      border-bottom: 1px solid #222;
      color: #ccc;
    }
    tr:hover td { background: #222; }
    
    .btn-delete {
      color: #ff4d4d;
      text-decoration: none;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.6rem;
      border: 1px solid transparent;
      transition: 0.3s;
    }
    .btn-delete:hover {
      border-color: #ff4d4d;
      background: rgba(255, 77, 77, 0.1);
    }
    .empty-msg {
      text-align: center;
      padding: 3rem;
      color: #555;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Panel de Administración</h1>
      <a href="/" class="back-btn">← Volver al inicio</a>
    </header>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Teléfono</th>
          <th>Servicio</th>
          <th>Fecha / Hora</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% if reservas %}
          {% for r in reservas %}
          <tr>
            <td>#{{ r[0] }}</td>
            <td style="color: #fff; font-weight: 500;">{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>{{ r[3] }}</td>
            <td>{{ r[4] }} <span style="color: #c17a56;">|</span> {{ r[5] }}</td>
            <td>
              <a href="/eliminar/{{ r[0] }}" 
                 class="btn-delete" 
                 onclick="return confirm('¿Estás seguro de eliminar esta reserva?')">Eliminar</a>
            </td>
          </tr>
          {% endfor %}
        {% else %}
          <tr>
            <td colspan="6" class="empty-msg">No hay reservas registradas.</td>
          </tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</body>
</html>
